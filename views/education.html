<!-- Education View -->
<div x-data="Education()" x-init="init()">

  <div class="page-header">
    <h1>Learn Trading</h1>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button :class="{active: tab === 'mcp'}" @click="tab = 'mcp'">MCP Setup</button>
    <button :class="{active: tab === 'glossary'}" @click="tab = 'glossary'">Glossary</button>
    <button :class="{active: tab === 'howto'}" @click="tab = 'howto'">How It Works</button>
  </div>

  <!-- MCP Setup tab -->
  <template x-if="tab === 'mcp'">
    <div>
      <!-- What is MCP -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Trading with Claude + Alpaca MCP</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p>This dashboard is <strong style="color:var(--text-primary)">read-only</strong> — it shows your portfolio, positions, and trade history. All actual trading is done through <strong style="color:var(--text-primary)">Claude Code</strong> using the <strong style="color:var(--text-primary)">Alpaca MCP server</strong>.</p>
          <p>The MCP (Model Context Protocol) server gives Claude direct access to 60+ Alpaca API tools — placing orders, checking quotes, managing watchlists, analyzing portfolio data, and more — all through natural language.</p>
        </div>
      </div>

      <!-- Prerequisites -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Prerequisites</div>
        <ol style="color:var(--text-secondary);font-size:0.9rem;padding-left:var(--space-lg);display:flex;flex-direction:column;gap:var(--space-sm)">
          <li>Install <strong style="color:var(--text-primary)">Python 3.10+</strong> from <a href="https://python.org" target="_blank">python.org</a></li>
          <li>Install <strong style="color:var(--text-primary)">uv</strong> (Python package manager):
            <code style="display:block;margin-top:4px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem">pip install uv</code>
          </li>
          <li>Install <strong style="color:var(--text-primary)">Claude Code</strong> CLI if you haven't already</li>
          <li>Have your <strong style="color:var(--text-primary)">Alpaca API keys</strong> ready (same ones you entered in Settings)</li>
        </ol>
      </div>

      <!-- MCP Configuration -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">MCP Server Configuration</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p>The <code>.mcp.json</code> file in this project is pre-configured. Your API keys are stored as <strong style="color:var(--text-primary)">Windows environment variables</strong> so they never end up in any file in the repo.</p>
          <p style="margin-top:var(--space-xs)">Set these in <strong style="color:var(--text-primary)">Windows Settings &gt; System &gt; About &gt; Advanced system settings &gt; Environment Variables</strong> (User variables):</p>
          <div style="padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem;font-family:monospace;overflow-x:auto;line-height:1.8">ALPACA_API_KEY = PK...<br>ALPACA_SECRET_KEY = your-secret-key</div>
          <p style="margin-top:var(--space-xs)">Or via PowerShell (runs once, persists across reboots):</p>
          <div style="padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem;font-family:monospace;overflow-x:auto;line-height:1.8">[Environment]::SetEnvironmentVariable("ALPACA_API_KEY", "PK...", "User")<br>[Environment]::SetEnvironmentVariable("ALPACA_SECRET_KEY", "your-secret", "User")</div>
          <p style="margin-top:var(--space-xs)">After setting these, restart your terminal. The MCP server inherits them automatically — no secrets in any config file.</p>
        </div>
      </div>

      <!-- Example commands -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Example Claude Commands</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-md)">
          <div>
            <strong style="color:var(--text-primary)">Check your portfolio</strong>
            <code style="display:block;margin-top:4px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem">"Show me my current portfolio and positions"</code>
          </div>
          <div>
            <strong style="color:var(--text-primary)">Place a trade</strong>
            <code style="display:block;margin-top:4px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem">"Buy 10 shares of AAPL at market price"</code>
          </div>
          <div>
            <strong style="color:var(--text-primary)">Get a quote</strong>
            <code style="display:block;margin-top:4px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem">"What's the current price of TSLA?"</code>
          </div>
          <div>
            <strong style="color:var(--text-primary)">Analyze a stock</strong>
            <code style="display:block;margin-top:4px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem">"Analyze MSFT — give me price history, volume trends, and your take"</code>
          </div>
          <div>
            <strong style="color:var(--text-primary)">Auto-trade with /loop</strong>
            <code style="display:block;margin-top:4px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem">"Check my positions every 5 minutes. If any position drops more than 3%, sell it."</code>
            <div class="form-hint" style="margin-top:4px">Use Claude Code's <code>/loop</code> command to run automated monitoring and trading strategies.</div>
          </div>
        </div>
      </div>

      <!-- Safety note -->
      <div class="card" style="border-color:var(--warning)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md);color:var(--warning)">
          Safety: Paper Trading First
        </div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p>The MCP server defaults to <strong>paper trading mode</strong> (<code>ALPACA_PAPER_TRADE=true</code>). This means all trades use simulated money — you can't lose real funds while learning.</p>
          <p>To switch to live trading, change <code>ALPACA_PAPER_TRADE</code> to <code>"false"</code> in <code>.mcp.json</code>. <strong style="color:var(--danger)">Only do this when you're confident in your strategy and understand the risks.</strong></p>
        </div>
      </div>
    </div>
  </template>

  <!-- Glossary tab -->
  <template x-if="tab === 'glossary'">
    <div>
      <!-- Search -->
      <div class="form-group">
        <input type="text" class="form-input" placeholder="Search terms..."
               x-model="searchQuery"
               style="font-size:0.9rem">
      </div>

      <!-- Terms -->
      <div class="card" style="padding:0 var(--space-lg)">
        <template x-for="item in filteredGlossary" :key="item.term">
          <div class="glossary-item">
            <div class="glossary-item__term" x-text="item.term"></div>
            <div class="glossary-item__definition" x-text="item.definition"></div>
          </div>
        </template>
        <template x-if="filteredGlossary.length === 0">
          <div style="padding:var(--space-xl);text-align:center;color:var(--text-muted)">
            No terms match your search.
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- How-to tab -->
  <template x-if="tab === 'howto'">
    <div>
      <!-- How to place your first trade via MCP -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Placing Your First Trade</div>
        <ol style="color:var(--text-secondary);font-size:0.9rem;padding-left:var(--space-lg);display:flex;flex-direction:column;gap:var(--space-sm)">
          <li>Go to <strong>Settings</strong> and enter your Alpaca API keys (paper trading first!)</li>
          <li>Set up the <strong>Alpaca MCP server</strong> in Claude Code (see <strong>MCP Setup</strong> tab)</li>
          <li>Open <strong>Claude Code</strong> in this project directory</li>
          <li>Tell Claude: <em>"Buy 5 shares of AAPL at market price"</em></li>
          <li>Claude will confirm the order details before executing</li>
          <li>Come back to this <strong>Dashboard</strong> and click <strong>Refresh</strong> to see your new position!</li>
        </ol>
      </div>

      <!-- Understanding order types -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Understanding Order Types</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-md)">
          <div>
            <strong style="color:var(--text-primary)">Market Order</strong> — Executes immediately at the current price. Best for beginners. The price you get might differ slightly from what you see (called "slippage"), especially for low-volume stocks.
          </div>
          <div>
            <strong style="color:var(--text-primary)">Limit Order</strong> — You set the exact price. The order only fills at your price or better. Use when you want to buy at a specific price that's lower than the current price ("I'll buy AAPL if it drops to $180").
          </div>
          <div>
            <strong style="color:var(--text-primary)">Stop Order</strong> — Triggers when a stock hits your stop price, then becomes a market order. Commonly used as a "stop-loss": "Sell my AAPL if it drops to $170" to limit your downside.
          </div>
          <div>
            <strong style="color:var(--text-primary)">Stop-Limit Order</strong> — Like a stop order, but becomes a limit order instead of a market order. More precise, but the order might not fill if the price moves past your limit.
          </div>
        </div>
      </div>

      <!-- Understanding P&L -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Understanding Your P&L</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p><strong style="color:var(--text-primary)">Unrealized P&L:</strong> The profit or loss on stocks you still own. It's "on paper" — it can change until you sell.</p>
          <p><strong style="color:var(--text-primary)">Realized P&L:</strong> The actual profit or loss from stocks you've already sold. This is locked in.</p>
          <p><strong style="color:var(--text-primary)">Daily P&L:</strong> How much your portfolio value has changed since the market opened today.</p>
        </div>
      </div>

      <!-- The PDT rule -->
      <div class="card" style="border-color:var(--warning)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md);color:var(--warning)">
          Important: The Pattern Day Trader (PDT) Rule
        </div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p>If your account has <strong>less than $25,000</strong>, FINRA limits you to <strong>3 day trades per 5 business days</strong>.</p>
          <p>A "day trade" = buying and selling the same stock on the same day.</p>
          <p>If you exceed this limit, your account may be <strong>restricted for 90 days</strong>, allowing only closing trades (selling what you already own).</p>
          <p><strong style="color:var(--text-primary)">Tip:</strong> This doesn't apply to paper trading, but it's critical to understand before going live.</p>
        </div>
      </div>
    </div>
  </template>

</div>
