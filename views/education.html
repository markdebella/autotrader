<!-- Education View -->
<div x-data="Education()" x-init="init()">

  <div class="page-header">
    <h1>Learn</h1>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button :class="{active: tab === 'mcp'}" @click="tab = 'mcp'">How It Works</button>
    <button :class="{active: tab === 'glossary'}" @click="tab = 'glossary'">Glossary</button>
    <button :class="{active: tab === 'howto'}" @click="tab = 'howto'">Trading Basics</button>
  </div>

  <!-- How It Works tab -->
  <template x-if="tab === 'mcp'">
    <div>
      <!-- What AutoTrader is -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">What AutoTrader Is</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p>A <strong style="color:var(--text-primary)">visual, read-only dashboard</strong> for your Alpaca account — defaulting to <strong style="color:var(--text-primary)">paper (simulated) trading</strong>. It's <strong style="color:var(--text-primary)">education-first</strong>: it helps you understand your portfolio and proposes trade ideas you approve. It never trades on its own, and the dashboard itself never places orders.</p>
        </div>
      </div>

      <!-- Security: where your keys live -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Your Keys &amp; Security</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p>Your Alpaca API keys are <strong style="color:var(--text-primary)">never entered or stored in this app or your browser</strong>. They live only in <strong style="color:var(--text-primary)">Google Secret Manager</strong> and are read by a small backend service (Google Cloud Run) that this dashboard fetches data from.</p>
          <p>Your settings and trade history live in <strong style="color:var(--text-primary)">your own Google Drive</strong>. Because everything is tied to your Google sign-in, you can open AutoTrader on any computer and your data is there — with no keys exposed anywhere. (Details: <code>SECURITY.md</code> in the repo.)</p>
        </div>
      </div>

      <!-- The dashboard + Explain -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Reading the Dashboard</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p>The <strong style="color:var(--text-primary)">Dashboard</strong> shows your portfolio value, today's change, buying power, positions, open orders, and market status.</p>
          <p>Every number has an <strong style="color:var(--text-primary)">"Explain" (ⓘ)</strong> control: <strong style="color:var(--text-primary)">hover</strong> for a quick definition, or <strong style="color:var(--text-primary)">click</strong> for a plain-English explanation grounded in your real numbers, with links into the Glossary. If you ever see something you don't understand, that's the button to press.</p>
        </div>
      </div>

      <!-- Ideas / approve flow -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Trade Ideas (Approve / Deny)</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p>The <strong style="color:var(--text-primary)">Ideas</strong> tab lists trade suggestions for <strong style="color:var(--text-primary)">you</strong> to approve or deny — nothing trades automatically. Each idea shows <em>what</em> (symbol, side, size), <em>why</em> (reasoning), and how it fits within your <a href="#" @click.prevent="Router.go('settings')">risk limits</a>.</p>
          <p>Press <strong style="color:var(--text-primary)">Generate ideas</strong> for a fresh batch. By default they come from <strong style="color:var(--text-primary)">Claude (AI)</strong> analyzing your watchlist and recent market data; switch to a free <strong style="color:var(--text-primary)">rules-based</strong> engine anytime in <a href="#" @click.prevent="Router.go('settings')">Settings → Recommendation Engine</a>. The Claude API key lives in Secret Manager — never in your browser.</p>
          <p><strong style="color:var(--text-primary)">Approving</strong> records your decision and copies a ready-to-run command you paste into <strong style="color:var(--text-primary)">Claude Code</strong>, which places the order in <strong style="color:var(--text-primary)">paper mode</strong>. An idea that would breach a risk limit can't be approved.</p>
        </div>
      </div>

      <!-- Roadmap -->
      <div class="card">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">The Plan: Trust in Stages</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-md)">
          <div>
            <strong style="color:var(--gain)">1. Educate</strong> — understand every number on your dashboard. <em>(done)</em>
          </div>
          <div>
            <strong style="color:var(--text-primary)">2. Recommend + approve</strong> — ideas you approve or deny; execution stays in your hands. Still paper. <em>(in progress — the Ideas tab)</em>
          </div>
          <div>
            <strong style="color:var(--text-muted)">3. Guarded autonomy</strong> — a deterministic service trades on a schedule, but only within hard-coded risk limits, with a kill switch. <em>(planned)</em>
          </div>
          <p style="margin-top:var(--space-xs)">Guiding rule: <strong style="color:var(--text-primary)">paper before live, small before large</strong>, and execution is always deterministic code — never an AI pulling the trigger unchecked.</p>
        </div>
      </div>
    </div>
  </template>

  <!-- Glossary tab -->
  <template x-if="tab === 'glossary'">
    <div>
      <!-- Search -->
      <div class="form-group">
        <input type="text" class="form-input" placeholder="Search terms..."
               x-model="searchQuery"
               style="font-size:0.9rem">
      </div>

      <!-- Terms -->
      <div class="card" style="padding:0 var(--space-lg)">
        <template x-for="item in filteredGlossary" :key="item.term">
          <div class="glossary-item">
            <div class="glossary-item__term" x-text="item.term"></div>
            <div class="glossary-item__definition" x-text="item.definition"></div>
          </div>
        </template>
        <template x-if="filteredGlossary.length === 0">
          <div style="padding:var(--space-xl);text-align:center;color:var(--text-muted)">
            No terms match your search.
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- Trading Basics tab -->
  <template x-if="tab === 'howto'">
    <div>
      <!-- How a trade happens here -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">How a Trade Happens in AutoTrader</div>
        <ol style="color:var(--text-secondary);font-size:0.9rem;padding-left:var(--space-lg);display:flex;flex-direction:column;gap:var(--space-sm)">
          <li>Press <strong>Generate ideas</strong> in <strong>Ideas</strong> (Claude by default, or rules-based) — or decide on your own.</li>
          <li>You <strong>Approve</strong> it — only allowed if it passes your risk limits.</li>
          <li>The order is placed in <strong>paper mode</strong> (today: by running the copied command in Claude Code; later: automatically by the guarded execution service).</li>
          <li>Come back to the <strong>Dashboard</strong> and press <strong>Refresh</strong> to see the order and, once it fills, your new position.</li>
        </ol>
        <div class="form-hint" style="margin-top:var(--space-sm)">Orders placed while the market is closed sit as <strong>open orders</strong> ("accepted") and fill when the market next opens.</div>
      </div>

      <!-- Understanding order types -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Understanding Order Types</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-md)">
          <div>
            <strong style="color:var(--text-primary)">Market Order</strong> — Executes immediately at the current price. Best for beginners. The price you get might differ slightly from what you see (called "slippage"), especially for low-volume stocks.
          </div>
          <div>
            <strong style="color:var(--text-primary)">Limit Order</strong> — You set the exact price. The order only fills at your price or better. Use when you want to buy at a specific price that's lower than the current price ("I'll buy AAPL if it drops to $180").
          </div>
          <div>
            <strong style="color:var(--text-primary)">Stop Order</strong> — Triggers when a stock hits your stop price, then becomes a market order. Commonly used as a "stop-loss": "Sell my AAPL if it drops to $170" to limit your downside.
          </div>
          <div>
            <strong style="color:var(--text-primary)">Stop-Limit Order</strong> — Like a stop order, but becomes a limit order instead of a market order. More precise, but the order might not fill if the price moves past your limit.
          </div>
        </div>
      </div>

      <!-- Understanding P&L -->
      <div class="card" style="margin-bottom:var(--space-md)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md)">Understanding Your P&L</div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p><strong style="color:var(--text-primary)">Unrealized P&L:</strong> The profit or loss on stocks you still own. It's "on paper" — it can change until you sell.</p>
          <p><strong style="color:var(--text-primary)">Realized P&L:</strong> The actual profit or loss from stocks you've already sold. This is locked in.</p>
          <p><strong style="color:var(--text-primary)">Daily P&L:</strong> How much your portfolio value has changed since the market last closed.</p>
        </div>
      </div>

      <!-- The PDT rule -->
      <div class="card" style="border-color:var(--warning)">
        <div style="font-weight:700;font-size:1rem;margin-bottom:var(--space-md);color:var(--warning)">
          Important: The Pattern Day Trader (PDT) Rule
        </div>
        <div style="color:var(--text-secondary);font-size:0.9rem;display:flex;flex-direction:column;gap:var(--space-sm)">
          <p>If your account has <strong>less than $25,000</strong>, FINRA limits you to <strong>3 day trades per 5 business days</strong>.</p>
          <p>A "day trade" = buying and selling the same stock on the same day.</p>
          <p>If you exceed this limit, your account may be <strong>restricted for 90 days</strong>, allowing only closing trades (selling what you already own).</p>
          <p><strong style="color:var(--text-primary)">Tip:</strong> This doesn't apply to paper trading, but it's critical to understand before going live. Your <a href="#" @click.prevent="Router.go('settings')">risk limits</a> include a max-trades-per-day cap to help stay within it.</p>
        </div>
      </div>
    </div>
  </template>

</div>
