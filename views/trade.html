<!-- Trade View -->
<div x-data="Trade()" x-init="init()">

  <div class="page-header">
    <h1>Trade</h1>
  </div>

  <!-- Not connected -->
  <template x-if="!alpacaConnected">
    <div class="empty-state">
      <p>Connect your Alpaca account in <a href="#" @click.prevent="Router.go('settings')">Settings</a> to start trading.</p>
    </div>
  </template>

  <!-- Trade form -->
  <template x-if="alpacaConnected">
    <div>
      <!-- Symbol input -->
      <div class="form-group">
        <label class="form-label">Symbol</label>
        <input type="text" class="form-input" placeholder="e.g. AAPL"
               x-model="symbol" @input="symbol = symbol.toUpperCase()"
               style="text-transform:uppercase;font-weight:700;font-size:1.1rem">
      </div>

      <!-- Buy / Sell toggle -->
      <div class="side-toggle">
        <button :class="side === 'buy' ? 'active-buy' : ''" @click="side = 'buy'">Buy</button>
        <button :class="side === 'sell' ? 'active-sell' : ''" @click="side = 'sell'">Sell</button>
      </div>

      <!-- Order type -->
      <div class="form-group">
        <label class="form-label">
          Order Type
          <span class="tooltip-trigger" style="cursor:help;margin-left:4px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" style="display:inline;vertical-align:middle"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span class="tooltip" x-text="orderTypeDescription"></span>
          </span>
        </label>
        <select class="form-select" x-model="orderType">
          <template x-for="ot in CONFIG.orderTypes" :key="ot.id">
            <option :value="ot.id" x-text="ot.label"></option>
          </template>
        </select>
      </div>

      <!-- Quantity -->
      <div class="form-group">
        <label class="form-label">Shares</label>
        <input type="number" class="form-input" placeholder="Number of shares"
               x-model.number="qty" min="0" step="1">
      </div>

      <!-- Limit price (conditional) -->
      <template x-if="orderType === 'limit' || orderType === 'stop_limit'">
        <div class="form-group">
          <label class="form-label">Limit Price ($)</label>
          <input type="number" class="form-input" placeholder="0.00"
                 x-model.number="limitPrice" min="0" step="0.01">
        </div>
      </template>

      <!-- Stop price (conditional) -->
      <template x-if="orderType === 'stop' || orderType === 'stop_limit'">
        <div class="form-group">
          <label class="form-label">Stop Price ($)</label>
          <input type="number" class="form-input" placeholder="0.00"
                 x-model.number="stopPrice" min="0" step="0.01">
        </div>
      </template>

      <!-- Time in force -->
      <div class="form-group">
        <label class="form-label">
          Time in Force
          <span class="tooltip-trigger" style="cursor:help;margin-left:4px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" style="display:inline;vertical-align:middle"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span class="tooltip" x-text="tifDescription"></span>
          </span>
        </label>
        <select class="form-select" x-model="timeInForce">
          <template x-for="tif in CONFIG.timeInForce" :key="tif.id">
            <option :value="tif.id" x-text="tif.label"></option>
          </template>
        </select>
      </div>

      <!-- Notes -->
      <div class="form-group">
        <label class="form-label">Trade Journal Note (optional)</label>
        <textarea class="form-textarea" placeholder="Why are you making this trade?"
                  x-model="notes" rows="2" style="min-height:60px"></textarea>
        <div class="form-hint">Recording your reasoning helps you learn from both wins and losses.</div>
      </div>

      <!-- Submit -->
      <button class="btn btn-block"
              :class="side === 'buy' ? 'btn-success' : 'btn-danger'"
              :disabled="!canSubmit"
              @click="showConfirm = true"
              x-text="side === 'buy' ? 'Review Buy Order' : 'Review Sell Order'">
      </button>

      <!-- Confirmation modal -->
      <template x-if="showConfirm">
        <div class="modal-backdrop" @click.self="showConfirm = false">
          <div class="modal">
            <div class="modal__title">Confirm Order</div>
            <div class="modal__body">
              <p style="margin-bottom:var(--space-md)">
                <strong :style="side === 'buy' ? 'color:var(--gain)' : 'color:var(--loss)'"
                        x-text="side.toUpperCase()"></strong>
                <strong x-text="qty"></strong> shares of
                <strong x-text="symbol"></strong>
              </p>
              <p style="font-size:0.85rem;color:var(--text-muted)">
                <span x-text="orderType.replace('_',' ').toUpperCase()"></span> order
                <span x-show="limitPrice"> &bull; Limit: <span x-text="Utils.formatCurrency(limitPrice)"></span></span>
                <span x-show="stopPrice"> &bull; Stop: <span x-text="Utils.formatCurrency(stopPrice)"></span></span>
                &bull; <span x-text="timeInForce.toUpperCase()"></span>
              </p>
              <template x-if="$store.ui.paperMode">
                <p style="margin-top:var(--space-md);font-size:0.8rem;color:var(--paper-color)">This is a paper trade (simulated money).</p>
              </template>
              <template x-if="!$store.ui.paperMode">
                <p style="margin-top:var(--space-md);font-size:0.8rem;color:var(--live-color);font-weight:600">This is a LIVE trade with real money.</p>
              </template>
            </div>
            <div class="modal__actions">
              <button class="btn btn-secondary" @click="showConfirm = false">Cancel</button>
              <button class="btn" :class="side === 'buy' ? 'btn-success' : 'btn-danger'"
                      @click="submitOrder()">
                Confirm <span x-text="side.toUpperCase()"></span>
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </template>

</div>
